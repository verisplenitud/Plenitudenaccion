    var pre=(c.presionSist||c.presionDias)?'<div class="nmg"><div class="mb"><div class="mv">'+(c.presionSist||'--')+'/'+(c.presionDias||'--')+'</div><div class="ml">Presion Art.</div></div><div class="mb"><div class="mv">'+(c.presionMedia||'--')+'</div><div class="ml">P. Media</div></div></div>':'';
    var rec=c.recomendaciones?'<div class="nr"><div class="rt">Recomendaciones</div><p>'+c.recomendaciones+'</p></div>':'';
    cH+='<div class="nc"><div class="nhd"><div class="nf">'+c.fecha+'</div><div class="nm">'+c.mes+'</div></div><div class="nb"><div class="nmg"><div class="mb"><div class="mv">'+(c.peso||'--')+'</div><div class="ml">Peso kg</div></div><div class="mb"><div class="mv">'+(c.talla||'--')+'</div><div class="ml">Talla cm</div></div><div class="mb"><div class="mv">'+(c.imc||'--')+'</div><div class="ml">IMC</div></div><div class="mb"><div class="mv">'+(c.frecCardiaca||'--')+'</div><div class="ml">Frec. Card.</div></div></div>'+pre+med+'<div class="ntg">'+(c.pacientePerfil?'<span style="background:#D0F2E6;color:#1a7a52">'+c.pacientePerfil+'</span>':'')+(c.pacienteDx?'<span style="background:#D6F0FB;color:#1a4a7a">'+c.pacienteDx+'</span>':'')+(c.imcCod?'<span style="background:#EDD9F5;color:#5A2080">IMC: '+il+'</span>':'')+'</div>'+rec+'</div></div>';
  }
  return ch+cH;
}

function renderComp(){
  var mk=['marzo','abril','mayo','junio'],ml=['Mar','Abr','May','Jun'];
  var secs=[
    {l:'Ruta Preventiva',k:'rutaPts',c:'#1E2D5F',max:20},
    {l:'Nutricion',k:'nutriPts',c:'#5BC8A0',max:20},
    {l:'Pasos/Cal.',k:'pasosPts',c:'#5BBCE4',max:20},
    {l:'SITE',k:'sitePts',c:'#D07020',max:10},
    {l:'Miercoles',k:'miercPts',c:'#B06EC8',max:10}
  ];
  var h='<div class="cpc"><div class="ct">Comparativa por mes</div>';
  for(var si=0;si<secs.length;si++){
    var sc=secs[si];
    h+='<div class="crow"><div class="clb">'+sc.l+'<span style="font-size:10px;color:#A0AABF;font-weight:500;"> /'+sc.max+'</span></div><div class="cwr">';
    for(var mi=0;mi<mk.length;mi++){
      if(!U[mk[mi]])continue;
      var vv=U[mk[mi]][sc.k]||0,ww=Math.min(100,(vv/sc.max*100)).toFixed(0);
      h+='<div class="cri"><div class="cme">'+ml[mi]+'</div><div class="cbg"><div class="cfi" style="width:'+ww+'%;background:'+sc.c+'"></div></div><div class="cvl" style="color:'+sc.c+'">'+vv+'</div></div>';
    }
    h+='</div></div>';
  }
  return h+'</div>';
}

function renderPtsExtra(){
  var carrera=U.ptsExtraCarrera||0;
  var html='<div style="background:white;border-radius:18px;border:1.5px solid #E2E8F4;padding:28px;max-width:500px;margin:0 auto;">';
  html+='<div style="font-size:15px;font-weight:700;color:#1E2D5F;margin-bottom:20px;">&#x2B50; Puntos Extra</div>';
  html+='<div style="display:flex;align-items:center;gap:16px;padding:18px;background:#F8F6FF;border-radius:14px;border:1.5px solid #E2E8F4;">';
  html+='<div style="width:48px;height:48px;border-radius:12px;background:#EDD9F5;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;">&#x1F3C3;</div>';
  html+='<div style="flex:1;"><div style="font-size:14px;font-weight:700;color:#1E2D5F;">Carrera Veris Plenitud</div><div style="font-size:12px;color:#6B7280;margin-top:2px;">Participacion en carrera corporativa</div></div>';
  if(carrera>0){
    html+='<div style="font-size:26px;font-weight:800;color:#B06EC8;">'+carrera+' <span style="font-size:13px;font-weight:500;color:#A0AABF;">pts</span></div>';
  }else{
    html+='<div style="font-size:13px;font-weight:500;color:#A0AABF;">Sin participacion</div>';
  }
  html+='</div></div>';
  return html;
}

function renderPodio(){
  var NKEYS=['Nivel 1','Nivel 2','Nivel 3'];
  var NLBLS=['&#x1F331; Impulso','&#x1F4C8; Evolucion','&#x1F3C6; Pro'];
  var NCOLS=['#5BC8A0','#5BBCE4','#B06EC8'];
  var vistaOpts=[{k:'mes',l:'Por Mes'},{k:'general',l:'General'}];
  var mesOpts=[{k:'marzo',l:'Marzo'},{k:'abril',l:'Abril'},{k:'mayo',l:'Mayo'},{k:'junio',l:'Junio'}];
  var mesActivo=(['marzo','abril','mayo','junio'].indexOf(CM)>=0)?CM:'marzo';

  var html='<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;">';
  for(var vi=0;vi<vistaOpts.length;vi++){
    var vo=vistaOpts[vi],isAcV=PM===vo.k;
    html+='<button data-action="pvista" data-val="'+vo.k+'" style="padding:9px 20px;border:none;border-radius:10px;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:'+(isAcV?'linear-gradient(135deg,#1E2D5F,#2A3D7A)':'#F4F6FB')+';color:'+(isAcV?'white':'#6B7280')+';">'+vo.l+'</button>';
  }
  html+='<select id="pciudad-sel" style="padding:9px 14px;border:1.5px solid #E2E8F4;border-radius:10px;font-family:Nunito,sans-serif;font-size:13px;font-weight:600;color:#1E2D5F;background:white;cursor:pointer;outline:none;">';
  html+='<option value="todas"'+(PODIO_CIUDAD==='todas'?' selected':'')+'>Todas las ciudades</option>';
  html+='<option value="guayaquil"'+(PODIO_CIUDAD==='guayaquil'?' selected':'')+'>Guayaquil</option>';
  html+='<option value="quito"'+(PODIO_CIUDAD==='quito'?' selected':'')+'>Quito / Cuenca</option>';
  html+='</select>';
  html+='</div>';

  if(PM==='mes'){
    html+='<div style="display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;">';
    for(var mi=0;mi<mesOpts.length;mi++){
      var mo=mesOpts[mi],isAc2=mesActivo===mo.k;
      html+='<button data-action="pmes" data-val="'+mo.k+'" style="padding:8px 16px;border:none;border-radius:10px;font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:'+(isAc2?'linear-gradient(135deg,#5BBCE4,#1E2D5F)':'#F4F6FB')+';color:'+(isAc2?'white':'#6B7280')+';">'+mo.l+'</button>';
    }
    html+='</div>';
  }

  for(var ni=0;ni<NKEYS.length;ni++){
    var col=NCOLS[ni];
    var filtered=[];
    for(var di=0;di<DATA.length;di++){
      var d=DATA[di];
      if(!d.nivel||d.nivel.indexOf(NKEYS[ni])===-1)continue;
      if(PODIO_CIUDAD!=='todas'){
        var dc=(d.ciudad||'').toUpperCase().trim();
        if(PODIO_CIUDAD==='guayaquil'&&dc!=='GUAYAQUIL'&&dc!=='DURAN')continue;
        if(PODIO_CIUDAD==='quito'&&dc!=='QUITO'&&dc!=='CUENCA')continue;
      }
      var pts2=PM==='general'?(d.ptsFinales||0):(d[mesActivo]?d[mesActivo].totalPts||0:0);
      var nc=d.nombre;
      filtered.push({nombre:nc,cedula:d.cedula,sucursal:d.sucursal,pts:pts2});
    }
    filtered.sort(function(a,b){return b.pts-a.pts;});
    var top=filtered.slice(0,10);

    html+='<div style="background:white;border-radius:18px;border:1.5px solid #E2E8F4;margin-bottom:18px;overflow:hidden;">';
    html+='<div style="background:linear-gradient(135deg,#1E2D5F,'+col+');padding:16px 22px;display:flex;align-items:center;justify-content:space-between;">';
    html+='<span style="font-size:16px;font-weight:800;color:white;">'+NLBLS[ni]+'</span>';
    html+='<span style="background:rgba(255,255,255,.2);border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;color:white;">'+filtered.length+' participantes</span>';
    html+='</div>';

    if(top.length>=3){
      html+='<div style="display:flex;align-items:flex-end;justify-content:center;gap:10px;padding:20px 16px 0;background:#FAFBFF;">';
      var orden=[1,0,2],altos=['70px','90px','55px'],medals2=['&#x1F948;','&#x1F947;','&#x1F949;'],opas=['0.7','1','0.5'];
      for(var oi=0;oi<3;oi++){
        var ri2=orden[oi],pd=top[ri2];
        html+='<div style="text-align:center;flex:1;min-width:0;">';
        html+='<div style="font-size:11px;font-weight:700;color:#1E2D5F;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px;">'+pd.nombre.split(' ').slice(0,2).join(' ')+'</div>';
        html+='<div style="background:'+col+';opacity:'+opas[oi]+';border-radius:12px 12px 0 0;height:'+altos[oi]+';display:flex;align-items:center;justify-content:center;font-size:'+(oi===1?'34px':'26px')+';">'+medals2[oi]+'</div>';
        html+='<div style="background:'+col+';opacity:'+opas[oi]+';padding:6px 4px;"><span style="color:white;font-size:'+(oi===1?'15px':'13px')+';font-weight:900;">'+pd.pts.toFixed(1)+'</span><span style="color:rgba(255,255,255,.7);font-size:10px;"> pts</span></div>';
        html+='</div>';
      }
      html+='</div>';
    }

    html+='<div style="padding:12px 16px;">';
    var startIdx=top.length>=3?3:0;
    for(var ri=startIdx;ri<top.length;ri++){
      var pd2=top[ri],rank=ri+1;
      var isMine=pd2.cedula===U.cedula;
      html+='<div style="display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:12px;margin-bottom:4px;'+(isMine?'background:'+col+'18;border:2px solid '+col+';':'border:2px solid transparent;')+'">';
      html+='<div style="width:28px;height:28px;border-radius:50%;background:#EEF2FB;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#6B7280;flex-shrink:0;">'+rank+'</div>';
      html+='<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:700;color:'+(isMine?col:'#1E2D5F')+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+pd2.nombre.split(' ').slice(0,3).join(' ')+(isMine?' &#x2B50;':'')+'</div>';
      html+='<div style="font-size:11px;color:#6B7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+pd2.sucursal+'</div></div>';
      html+='<div style="font-size:17px;font-weight:900;color:'+col+';flex-shrink:0;">'+pd2.pts.toFixed(1)+'<span style="font-size:10px;font-weight:700;color:#A0AABF"> pts</span></div>';
      html+='</div>';
    }
    if(!top.length)html+='<div style="padding:20px;text-align:center;color:#6B7280;font-size:14px;font-weight:600;">Sin participantes</div>';
    html+='</div></div>';
  }
  return html;
}

function renderPerfil(){
  var fs=[{l:'Nombre',v:U.nombre},{l:'Cedula',v:U.cedula},{l:'Edad',v:U.edad},{l:'Cargo',v:U.cargo},{l:'Departamento',v:U.dept},{l:'Sucursal',v:U.sucursal},{l:'Ciudad',v:U.ciudad},{l:'Genero',v:U.genero},{l:'Estado',v:U.estado==='NOR'?'Activo':'Inactivo'},{l:'Email',v:U.email},{l:'Nivel',v:U.nivel},{l:'Pts Finales',v:U.ptsFinales?U.ptsFinales+' pts':'--'}];
  var h='<div class="stit">Informacion Personal</div><div class="ig">';
  for(var i=0;i<fs.length;i++)h+='<div class="ii"><div class="il">'+fs[i].l+'</div><div class="iv" style="font-size:'+(fs[i].l==='Email'?'11px':'14px')+'">'+(fs[i].v||'--')+'</div></div>';
  return h+'</div>';
}
